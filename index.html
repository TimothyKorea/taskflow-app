<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Timothy korea">
    <meta name="description" content="TaskFlow is a modern task management app that helps users organize, track, and complete tasks efficiently with a clean and intuitive interface.">

    <title>Taskflow - Your Daily Tasks</title>

    <!-- my css -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- favicon -->
    <link rel="icon" type="image/png" href="assets/image/taskflow-app-favicon.png"> 

    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Sora:wght@500;600&display=swap" rel="stylesheet">
</head>

<body>
    <aside class="side-bar">
        <div class="side-bar__brand-area">
            <p class="side-bar__title">Task<span>Flow</span></p>
        </div>
        <ul class="side-bar__filter" aria-label="tasks filter">
            <li class="side-bar__filter-list">
                <button type="button" class="side-bar__filter-btn">
                    <svg width="27" height="27" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="72" y1="80" x2="184" y2="80" stroke="#0D1630" stroke-width="16" stroke-linecap="round"/><line x1="72" y1="128" x2="184" y2="128" stroke="#0D1630" stroke-width="16" stroke-linecap="round"/><line x1="72" y1="176" x2="184" y2="176" stroke="#0D1630" stroke-width="16" stroke-linecap="round"/></svg>
                    <span class="side-bar__filter-text">All Tasks</span>
                </button>
            </li>
            <li class="side-bar__filter-list">
                <button type="button" class="side-bar__filter-btn">
                    <svg width="27" height="27" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="40" y="56" width="176" height="160" rx="28" stroke="#0D1630" stroke-width="16"/><line x1="40" y1="96" x2="216" y2="96" stroke="#0D1630" stroke-width="16"/><line x1="96" y1="32" x2="96" y2="72" stroke="#0D1630" stroke-width="16" stroke-linecap="round"/><line x1="160" y1="32" x2="160" y2="72" stroke="#0D1630" stroke-width="16" stroke-linecap="round"/><circle cx="128" cy="152" r="20" stroke="#0D1630" stroke-width="16"/></svg>
                    <span class="side-bar__filter-text">Today</span>
                </button>
            </li>
            <li class="side-bar__filter-list">
                <button type="button" class="side-bar__filter-btn">
                    <svg width="27" height="27" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M128 48L150 96L202 104L164 140L174 192L128 166L82 192L92 140L54 104L106 96L128 48Z" stroke="#0D1630" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span class="side-bar__filter-text">Important</span>
                </button>
            </li>
            <li class="side-bar__filter-list">
                <button type="button" class="side-bar__filter-btn">
                    <svg width="27" height="27" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="128" cy="128" r="84" stroke="#0D1630" stroke-width="16"/> <path d="M96 128L120 152L168 104" stroke="#0D1630" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span class="side-bar__filter-text">Completed</span>
                </button>
            </li>
        </ul>
    </aside>


    <main class="main-content">
        <div class="main-content__title">
            <h1 class="main-content__title-text">Today</h1>
        </div>

        <form class="main-content__task-entry">
            <div class="main-content__task-group">
                <label for="task-name">Add a new task</label>
                <input class="main-content__task-input" type="text" placeholder="Add a new task..." id="task-name" minlength="3">
            </div>

            <div class="main-content__input-btn-row">
                <div class="main-content__date-group">
                    <label for="date">Pick a date</label>
                    <input class="main-content__date-input" type="date" id="date">
                </div>
                <button class="main-content__add-btn" type="button">Add</button>
            </div>
        </form>    
    </main>
</body>
</html>
